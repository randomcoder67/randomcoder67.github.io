on:
    push:
        branches:
            - main

name: test-thing

jobs:
    checkout-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@main
              
            - name: Set up python
              uses: actions/setup-python@v2
              with: 
                python-version: 3.x

            - name: Install dependancies
              run: |
                python -m pip install --upgrade pip
                pip install markdown
            
            - name: Render to markdown
              run: |
                mkdir -p rendered
                markdown_py -f rendered/thing.html main/thing.md

            - name: Commit and push cahnges
              run: |
                git config --local user.email "action@github.com"
                git config --local user.name "GitHub Action"

                git add checkout -b gh-pages
                git add rendered/
                git commit -m "Rendered markdown files"
                git push origin gh-pages
